version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: adspulse_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ads_manager

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: adspulse_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/ads_manager
      JWT_SECRET: your_super_secret_jwt_key_change_this
      CLIENT_URL: http://localhost:3000
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: adspulse_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
